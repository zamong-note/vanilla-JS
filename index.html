<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Kokoa Clone</title>
</head>
<body>
    <div class="status-bar">
        <div class="status-bar__column">
            <span>No Service</span>
            <i class="fa-solid fa-wifi"></i>
        </div>
        <div class="status-bar__column">
            <span>18:43</span>
        </div>
        <div class="status-bar__column">
            <span>110%</span>
            <i class="fa-solid fa-battery-full fa-lg"></i>
            <i class="fa-solid fa-bolt"></i>
        </div>
    </div>

    <header class="welcome-header">
        <h1 class="welcome-header__title">Welcome to Kokoa Clone</h1>
        <p class="welcome-header__text">If you Have a Kokoa Account, log in with your email or phone number.</p>
    </header>

    <form action="friends.html" method="get" id="login-form">
        <input name="username" type="text" placeholder="Email or phone number" />
        <input name="password" type="password" placeholder="Password" />
        <input type="submit" value="Log In" />
        <a href="#">Find Kokoa Account or Password</a>
    </form>
    <!-- #6.9 다음페이지로 넘어갈 준비 추가(firends.html로 이동)
     백엔드가 없기 때문에 그냥 get으로 넘어가도록 구성-->




    <script src="https://kit.fontawesome.com/5882a4dbdb.js" crossorigin="anonymous"></script>
</body>
</html>

<!-- #6.2 BEM
 - BEM(Block Element Modifier) 라고 한다. 많이 쓰는 양식이다. 수정하기 쉽도록. 
 
 => .btn {}   : 블록
    .btn__price : 블록안에 엘리먼트 (버튼안에 프라이스)
    .btn--orange {} : modifier (버튼을 오렌지로 만들어주는것이다 (직관적!))

문제점이 있다면 클래스가 엄청 커질 수 있다. 하지만 프로들이 어떻게 하는지 알아보고 코드를 이해해보려고 해보는게 매우 중요하다. 
그냥 html을 보고 이건 버튼이고 크고 오렌지네!
강의에선 쓰고 안쓰고를 둘 다 해볼 것이다. BEM을 쓰거나, id와 class를 섞어쓰는 것
-->

<i>는 아이콘의 줄임말이다
